{{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace (printf "%s-secrets" .Release.Name)) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Namespace }}
type: Opaque
data:
{{- if $existingSecret }}
  sourceDatabaseUsername: {{ index $existingSecret.data "sourceDatabaseUsername" }}
  sourceDatabasePassword: {{ index $existingSecret.data "sourceDatabasePassword" }}
  targetDatabaseUsername: {{ index $existingSecret.data "targetDatabaseUsername" }}
  targetDatabasePassword: {{ index $existingSecret.data "targetDatabasePassword" }}
{{- else }}
  # First deployment — replace these values manually after install:
  #   kubectl edit secret {{ .Release.Name }}-secrets -n {{ .Release.Namespace }}
  sourceDatabaseUsername: {{ "CHANGE_ME" | b64enc | quote }}
  sourceDatabasePassword: {{ "CHANGE_ME" | b64enc | quote }}
  targetDatabaseUsername: {{ "CHANGE_ME" | b64enc | quote }}
  targetDatabasePassword: {{ "CHANGE_ME" | b64enc | quote }}
{{- end }}
