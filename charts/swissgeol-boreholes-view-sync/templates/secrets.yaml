{{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace (printf "%s-secrets" .Release.Name)) }}
{{- $existing := dict }}
{{- if $existingSecret }}
  {{- $existing = $existingSecret.data }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Namespace }}
type: Opaque
data:
  # Source database
  sourceDatabaseHost: {{ include "resolve-secret" (dict "override" .Values.db.source.host "existing" $existing "key" "sourceDatabaseHost" "fallback" "CHANGE_ME") | quote }}
  sourceDatabasePort: {{ include "resolve-secret" (dict "override" .Values.db.source.port "existing" $existing "key" "sourceDatabasePort" "fallback" "5432") | quote }}
  sourceDatabaseName: {{ include "resolve-secret" (dict "override" .Values.db.source.name "existing" $existing "key" "sourceDatabaseName" "fallback" "CHANGE_ME") | quote }}
  sourceDatabaseSchema: {{ include "resolve-secret" (dict "override" .Values.db.source.schema "existing" $existing "key" "sourceDatabaseSchema" "fallback" "CHANGE_ME") | quote }}
  sourceDatabaseUsername: {{ include "resolve-secret" (dict "override" .Values.db.source.username "existing" $existing "key" "sourceDatabaseUsername" "fallback" "CHANGE_ME") | quote }}
  sourceDatabasePassword: {{ include "resolve-secret" (dict "override" .Values.db.source.password "existing" $existing "key" "sourceDatabasePassword" "fallback" "CHANGE_ME") | quote }}
  # Target database
  targetDatabaseHost: {{ include "resolve-secret" (dict "override" .Values.db.target.host "existing" $existing "key" "targetDatabaseHost" "fallback" "CHANGE_ME") | quote }}
  targetDatabasePort: {{ include "resolve-secret" (dict "override" .Values.db.target.port "existing" $existing "key" "targetDatabasePort" "fallback" "5432") | quote }}
  targetDatabaseName: {{ include "resolve-secret" (dict "override" .Values.db.target.name "existing" $existing "key" "targetDatabaseName" "fallback" "CHANGE_ME") | quote }}
  targetDatabaseUsername: {{ include "resolve-secret" (dict "override" .Values.db.target.username "existing" $existing "key" "targetDatabaseUsername" "fallback" "CHANGE_ME") | quote }}
  targetDatabasePassword: {{ include "resolve-secret" (dict "override" .Values.db.target.password "existing" $existing "key" "targetDatabasePassword" "fallback" "CHANGE_ME") | quote }}
