{{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace (printf "%s-secrets" .Release.Name)) }}
{{- $awsRoleArn := .Values.ocr.awsRoleArn | default "" }}
{{- if and (not $awsRoleArn) $existingSecret }}
  {{- if hasKey $existingSecret.data "awsRoleArn" }}
    {{- $awsRoleArn = index $existingSecret.data "awsRoleArn" | b64dec }}
  {{- end }}
{{- end }}
{{- if not $awsRoleArn }}
  {{- $awsRoleArn = "CHANGE_ME" }}
{{- end }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-ocr-api
  namespace: {{ .Release.Namespace }}
{{- if ne $awsRoleArn "CHANGE_ME" }}
  annotations:
    eks.amazonaws.com/role-arn: {{ $awsRoleArn | quote }}
{{- end }}
