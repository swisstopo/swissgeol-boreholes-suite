{{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace (printf "%s-secrets" .Release.Name)) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Namespace }}
type: Opaque
data:
{{- if $existingSecret }}
  databaseUsername: {{ index $existingSecret.data "databaseUsername" }}
  databasePassword: {{ index $existingSecret.data "databasePassword" }}
  databaseConnectionString: {{ index $existingSecret.data "databaseConnectionString" }}
  s3AccessKey: {{ index $existingSecret.data "s3AccessKey" }}
  s3SecretKey: {{ index $existingSecret.data "s3SecretKey" }}
{{- else }}
  # First deployment — replace these values manually after install:
  #   kubectl edit secret {{ .Release.Name }}-secrets -n {{ .Release.Namespace }}
  databaseUsername: {{ "CHANGE_ME" | b64enc | quote }}
  databasePassword: {{ "CHANGE_ME" | b64enc | quote }}
  databaseConnectionString: {{ "Host=CHANGE_ME;Port=5432;Database=CHANGE_ME;Username=CHANGE_ME;Password=CHANGE_ME" | b64enc | quote }}
  s3AccessKey: {{ "CHANGE_ME" | b64enc | quote }}
  s3SecretKey: {{ "CHANGE_ME" | b64enc | quote }}
{{- end }}
{{- if .Values.auth.basicAuthEnabled }}
---
{{- $existingBasicAuth := (lookup "v1" "Secret" .Release.Namespace (printf "%s-basic-auth-secret" .Release.Name)) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-basic-auth-secret
  namespace: {{ .Release.Namespace }}
type: Opaque
data:
{{- if $existingBasicAuth }}
  users: {{ index $existingBasicAuth.data "users" }}
{{- else }}
  users: {{ htpasswd (default "admin" .Values.auth.basicAuthUsername) (default "CHANGE_ME" .Values.auth.basicAuthPassword) | b64enc | quote }}
{{- end }}
{{- end }}
