{{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace (printf "%s-secrets" .Release.Name)) }}
{{- $existing := dict }}
{{- if $existingSecret }}
  {{- $existing = $existingSecret.data }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Namespace }}
type: Opaque
data:
  # Database
  databaseHost: {{ include "resolve-secret" (dict "override" .Values.database.host "existing" $existing "key" "databaseHost" "fallback" "CHANGE_ME") | quote }}
  databaseName: {{ include "resolve-secret" (dict "override" .Values.database.name "existing" $existing "key" "databaseName" "fallback" "CHANGE_ME") | quote }}
  databaseUsername: {{ include "resolve-secret" (dict "override" .Values.database.username "existing" $existing "key" "databaseUsername" "fallback" "CHANGE_ME") | quote }}
  databasePassword: {{ include "resolve-secret" (dict "override" .Values.database.password "existing" $existing "key" "databasePassword" "fallback" "CHANGE_ME") | quote }}
  databaseConnectionString: {{ include "resolve-secret" (dict "override" .Values.database.connectionString "existing" $existing "key" "databaseConnectionString" "fallback" "Host=CHANGE_ME;Port=5432;Database=CHANGE_ME;Username=CHANGE_ME;Password=CHANGE_ME") | quote }}
  # S3
  s3Bucket: {{ include "resolve-secret" (dict "override" .Values.s3.bucket "existing" $existing "key" "s3Bucket" "fallback" "CHANGE_ME") | quote }}
  s3PhotosBucket: {{ include "resolve-secret" (dict "override" .Values.s3.photosBucket "existing" $existing "key" "s3PhotosBucket" "fallback" "CHANGE_ME") | quote }}
  s3LogFilesBucket: {{ include "resolve-secret" (dict "override" .Values.s3.logFilesBucket "existing" $existing "key" "s3LogFilesBucket" "fallback" "CHANGE_ME") | quote }}
  s3AccessKey: {{ include "resolve-secret" (dict "override" .Values.s3.accessKey "existing" $existing "key" "s3AccessKey" "fallback" "CHANGE_ME") | quote }}
  s3SecretKey: {{ include "resolve-secret" (dict "override" .Values.s3.secretKey "existing" $existing "key" "s3SecretKey" "fallback" "CHANGE_ME") | quote }}
  # Auth
  authAuthority: {{ include "resolve-secret" (dict "override" .Values.auth.authority "existing" $existing "key" "authAuthority" "fallback" "CHANGE_ME") | quote }}
  authAudience: {{ include "resolve-secret" (dict "override" .Values.auth.audience "existing" $existing "key" "authAudience" "fallback" "CHANGE_ME") | quote }}
  # OCR
  awsRoleArn: {{ include "resolve-secret" (dict "override" .Values.ocr.awsRoleArn "existing" $existing "key" "awsRoleArn" "fallback" "CHANGE_ME") | quote }}
{{- if .Values.auth.basicAuthEnabled }}
---
{{- $existingBasicAuth := (lookup "v1" "Secret" .Release.Namespace (printf "%s-basic-auth-secret" .Release.Name)) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-basic-auth-secret
  namespace: {{ .Release.Namespace }}
type: Opaque
data:
{{- if $existingBasicAuth }}
  users: {{ index $existingBasicAuth.data "users" }}
{{- else }}
  users: {{ htpasswd (default "admin" .Values.auth.basicAuthUsername) (default "CHANGE_ME" .Values.auth.basicAuthPassword) | b64enc | quote }}
{{- end }}
{{- end }}
