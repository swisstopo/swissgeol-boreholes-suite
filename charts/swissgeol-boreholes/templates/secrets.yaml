{{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace (printf "%s-secrets" .Release.Name)) }}
{{- $existing := dict }}
{{- if $existingSecret }}
  {{- $existing = $existingSecret.data }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Namespace }}
type: Opaque
data:
  # Database
  databaseHost: {{ include "resolve-secret" (dict "override" .Values.database.host "existing" $existing "key" "databaseHost" "valuesPath" "database.host") | quote }}
  databaseName: {{ include "resolve-secret" (dict "override" .Values.database.name "existing" $existing "key" "databaseName" "valuesPath" "database.name") | quote }}
  databaseUsername: {{ include "resolve-secret" (dict "override" .Values.database.username "existing" $existing "key" "databaseUsername" "valuesPath" "database.username") | quote }}
  databasePassword: {{ include "resolve-secret" (dict "override" .Values.database.password "existing" $existing "key" "databasePassword" "valuesPath" "database.password") | quote }}
  databaseConnectionString: {{ include "resolve-secret" (dict "override" .Values.database.connectionString "existing" $existing "key" "databaseConnectionString" "valuesPath" "database.connectionString") | quote }}
  # S3
  s3Bucket: {{ include "resolve-secret" (dict "override" .Values.s3.bucket "existing" $existing "key" "s3Bucket" "valuesPath" "s3.bucket") | quote }}
  s3PhotosBucket: {{ include "resolve-secret" (dict "override" .Values.s3.photosBucket "existing" $existing "key" "s3PhotosBucket" "valuesPath" "s3.photosBucket") | quote }}
  s3LogFilesBucket: {{ include "resolve-secret" (dict "override" .Values.s3.logFilesBucket "existing" $existing "key" "s3LogFilesBucket" "valuesPath" "s3.logFilesBucket") | quote }}
  s3AccessKey: {{ include "resolve-secret" (dict "override" .Values.s3.accessKey "existing" $existing "key" "s3AccessKey" "valuesPath" "s3.accessKey") | quote }}
  s3SecretKey: {{ include "resolve-secret" (dict "override" .Values.s3.secretKey "existing" $existing "key" "s3SecretKey" "valuesPath" "s3.secretKey") | quote }}
  # Auth
  authAuthority: {{ include "resolve-secret" (dict "override" .Values.auth.authority "existing" $existing "key" "authAuthority" "valuesPath" "auth.authority") | quote }}
  authAudience: {{ include "resolve-secret" (dict "override" .Values.auth.audience "existing" $existing "key" "authAudience" "valuesPath" "auth.audience") | quote }}
  # OCR
  # awsRoleArn is read at template time by ocr-service-account.yaml via lookup
  # to render the IRSA annotation. It cannot use secretKeyRef — SA annotations must be literal strings.
  awsRoleArn: {{ include "resolve-secret" (dict "override" .Values.ocr.awsRoleArn "existing" $existing "key" "awsRoleArn" "fallback" "") | quote }}
{{- if .Values.auth.basicAuthEnabled }}
---
{{- $existingBasicAuth := (lookup "v1" "Secret" .Release.Namespace (printf "%s-basic-auth-secret" .Release.Name)) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-basic-auth-secret
  namespace: {{ .Release.Namespace }}
type: Opaque
data:
{{- if $existingBasicAuth }}
  users: {{ index $existingBasicAuth.data "users" }}
{{- else }}
  users: {{ htpasswd (default "admin" .Values.auth.basicAuthUsername) (default "CHANGE_ME" .Values.auth.basicAuthPassword) | b64enc | quote }}
{{- end }}
{{- end }}
