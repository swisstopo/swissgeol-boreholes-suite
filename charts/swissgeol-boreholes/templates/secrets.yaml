{{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace (printf "%s-secrets" .Release.Name)) }}
{{- $existing := dict }}
{{- if $existingSecret }}
  {{- $existing = $existingSecret.data }}
{{- end }}
{{/*
  Resolve each field independently (--set, then existing, then fail if empty), then
  build the connection string from the resolved values. Discrete keys feed the
  legacy API (DB_*); the connection string feeds the .NET API
  (CONNECTIONSTRINGS__BdmsContext).
*/}}
{{- $dbHost := include "resolve-secret-plain" (dict "override" .Values.database.host "existing" $existing "key" "databaseHost" "valuesPath" "database.host") }}
{{- $dbName := include "resolve-secret-plain" (dict "override" .Values.database.name "existing" $existing "key" "databaseName" "valuesPath" "database.name") }}
{{- $dbUser := include "resolve-secret-plain" (dict "override" .Values.database.username "existing" $existing "key" "databaseUsername" "valuesPath" "database.username") }}
{{- $dbPass := include "resolve-secret-plain" (dict "override" .Values.database.password "existing" $existing "key" "databasePassword" "valuesPath" "database.password") }}
{{- $dbPort := .Values.database.port | default "5432" | toString }}
{{- $dbConn := printf "Host=%s;Port=%s;Database=%s;Username=%s;Password=%s" $dbHost $dbPort $dbName $dbUser $dbPass }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Namespace }}
type: Opaque
data:
  # Database: discrete fields (legacy API) and the derived connection string (.NET API)
  databaseHost: {{ $dbHost | b64enc | quote }}
  databaseName: {{ $dbName | b64enc | quote }}
  databaseUsername: {{ $dbUser | b64enc | quote }}
  databasePassword: {{ $dbPass | b64enc | quote }}
  databaseConnectionString: {{ $dbConn | b64enc | quote }}
  # S3
  s3Bucket: {{ include "resolve-secret" (dict "override" .Values.s3.bucket "existing" $existing "key" "s3Bucket" "valuesPath" "s3.bucket") | quote }}
  s3PhotosBucket: {{ include "resolve-secret" (dict "override" .Values.s3.photosBucket "existing" $existing "key" "s3PhotosBucket" "valuesPath" "s3.photosBucket") | quote }}
  s3LogFilesBucket: {{ include "resolve-secret" (dict "override" .Values.s3.logFilesBucket "existing" $existing "key" "s3LogFilesBucket" "valuesPath" "s3.logFilesBucket") | quote }}
  s3AccessKey: {{ include "resolve-secret" (dict "override" .Values.s3.accessKey "existing" $existing "key" "s3AccessKey" "valuesPath" "s3.accessKey") | quote }}
  s3SecretKey: {{ include "resolve-secret" (dict "override" .Values.s3.secretKey "existing" $existing "key" "s3SecretKey" "valuesPath" "s3.secretKey") | quote }}
  # Auth
  authAuthority: {{ include "resolve-secret" (dict "override" .Values.auth.authority "existing" $existing "key" "authAuthority" "valuesPath" "auth.authority") | quote }}
  authAudience: {{ include "resolve-secret" (dict "override" .Values.auth.audience "existing" $existing "key" "authAudience" "valuesPath" "auth.audience") | quote }}
  # OCR
  # awsRoleArn is read at template time by ocr-service-account.yaml via lookup
  # to render the IRSA annotation. It cannot use secretKeyRef (SA annotations must be literal strings).
  awsRoleArn: {{ include "resolve-secret" (dict "override" .Values.ocr.awsRoleArn "existing" $existing "key" "awsRoleArn" "fallback" "") | quote }}
{{- if .Values.auth.basicAuthEnabled }}
---
{{- $existingBasicAuth := (lookup "v1" "Secret" .Release.Namespace (printf "%s-basic-auth-secret" .Release.Name)) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-basic-auth-secret
  namespace: {{ .Release.Namespace }}
type: Opaque
data:
{{- if and .Values.auth.basicAuthUsername .Values.auth.basicAuthPassword }}
  users: {{ htpasswd .Values.auth.basicAuthUsername .Values.auth.basicAuthPassword | b64enc | quote }}
{{- else if (and $existingBasicAuth (hasKey $existingBasicAuth.data "users")) }}
  users: {{ index $existingBasicAuth.data "users" }}
{{- else }}
  {{- fail "Basic auth is enabled but no credentials are available. Supply both on first deploy via --set auth.basicAuthUsername=<user> --set auth.basicAuthPassword=<password>, or pre-populate the 'users' key in the existing <release>-basic-auth-secret Secret before upgrading." }}
{{- end }}
{{- end }}
