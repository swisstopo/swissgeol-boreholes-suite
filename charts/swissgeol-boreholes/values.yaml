# Default values for the swissgeol-boreholes application.
# This is a YAML-formatted file.

#
# General application configuration
#
app:
  # -- The fully qualified domain name the application gets accessed by
  domain:
  # -- The timezone which will be used in the application
  timezone: Europe/Zurich
  # -- The tag name of the Docker image tag to be deployed (updated by release workflow)
  version: v2.1.1462

dataextraction:
  # -- The tag name of the Docker image tag to be deployed (updated by release workflow)
  version: v1.0.144

ocr:
  # -- The tag name of the Docker image tag to be deployed (updated by release workflow)
  version: 1.1.3
  # -- The OCR confidence score threshold to be used.
  confidenceThreshold: 0.45
  # -- Applies OCR more aggressively, also e.g. to images inside
  # -- digitally-born PDF documents, as long as the newly detected
  # -- text does not overlap with any pre-existing digital text.
  useAggressiveStrategy: true
  # -- Skip OCR processing entirely.
  skipProcessing: false
  # -- The AWS role ARN to be used for the OCR API (needed for IRSA) (stored as secret)
  awsRoleArn:

# OpenID Connect configuration
auth:
  # -- The issuer URL of the OpenID Connect provider (stored as secret)
  # -- e.g. https://cognito-idp.<region>.amazonaws.com/<user_pool_id>
  authority:
  # -- The client ID of the application (stored as secret)
  audience:
  # -- The required scopes needed by the application
  scopes: openid profile email
  # -- The claim type to be used to get the user's groups
  groupClaimType:
  # -- The name of the group the user must be a member of
  authorizedGroupName:
  # -- Enables anonymous mode for the application.
  anonymousModeEnabled: false
  # -- Enables basic authentication on the Traefik IngressRoute.
  # -- When enabled, set credentials via: kubectl edit secret <release>-basic-auth-secret
  basicAuthEnabled: false

# Database configuration
database:
  # -- The hostname of the database server (stored as secret)
  host:
  # -- The port of the database server
  port: 5432
  # -- The name of the database (stored as secret)
  name:
  # -- The database username (stored as secret)
  username:
  # -- The database password (stored as secret)
  password:
  # -- The full database connection string (stored as secret)
  connectionString:

#
# Desired number of replicas for the application
#
replicaCount: 1

# AWS S3 Bucket configuration
s3:
  # -- The endpoint of the S3 bucket
  # -- e.g. https://s3.<region>.amazonaws.com
  endpoint:
  # -- The name of the S3 bucket (stored as secret)
  bucket:
  # -- The name of the S3 bucket for the photos (stored as secret)
  photosBucket:
  # -- The name of the S3 bucket for the log files (stored as secret)
  logFilesBucket:
  # -- The S3 access key (stored as secret)
  accessKey:
  # -- The S3 secret key (stored as secret)
  secretKey:
  # -- Set to 0 to use an insecure connection
  secure: "1"

# Google Analytics configuration
googleAnalytics:
  # -- The tracking ID of the Google Analytics account
  trackingId:
