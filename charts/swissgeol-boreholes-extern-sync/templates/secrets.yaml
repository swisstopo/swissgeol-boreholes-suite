{{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace (printf "%s-secrets" .Release.Name)) }}
{{- $existing := dict }}
{{- if $existingSecret }}
  {{- $existing = $existingSecret.data }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Namespace }}
type: Opaque
data:
  # Each connection string is one complete value, read directly by the sync job
  # (CONNECTIONSTRINGS__SourceBdmsContext / TargetBdmsContext).
  sourceDatabaseConnectionString: {{ include "resolve-secret" (dict "override" .Values.db.source.connectionString "existing" $existing "key" "sourceDatabaseConnectionString" "valuesPath" "db.source.connectionString") | quote }}
  targetDatabaseConnectionString: {{ include "resolve-secret" (dict "override" .Values.db.target.connectionString "existing" $existing "key" "targetDatabaseConnectionString" "valuesPath" "db.target.connectionString") | quote }}
