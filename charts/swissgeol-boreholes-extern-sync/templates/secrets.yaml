{{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace (printf "%s-secrets" .Release.Name)) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Namespace }}
type: Opaque
data:
{{- if $existingSecret }}
  sourceDatabaseConnectionString: {{ index $existingSecret.data "sourceDatabaseConnectionString" }}
  targetDatabaseConnectionString: {{ index $existingSecret.data "targetDatabaseConnectionString" }}
{{- else }}
  # First deployment — replace these values manually after install:
  #   kubectl edit secret {{ .Release.Name }}-secrets -n {{ .Release.Namespace }}
  sourceDatabaseConnectionString: {{ "Host=CHANGE_ME;Port=5432;Database=CHANGE_ME;Username=CHANGE_ME;Password=CHANGE_ME" | b64enc | quote }}
  targetDatabaseConnectionString: {{ "Host=CHANGE_ME;Port=5432;Database=CHANGE_ME;Username=CHANGE_ME;Password=CHANGE_ME" | b64enc | quote }}
{{- end }}
