# Environment values for INT cluster — extern-sync
# Namespace: swissgeol-boreholes-extern-sync
# Cluster: arn:aws:eks:eu-central-1:779726271945:cluster/int

app:
  version: # TODO: e.g. v2.1.1431
  timezone: Europe/Zurich
  schedule: # TODO: e.g. "0 0 * * *"

resources:
