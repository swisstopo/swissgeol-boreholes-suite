# Default values for the swissgeol-boreholes-extern-sync application.
# This is a YAML-formatted file.

#
# General application configuration
#
app:
  # -- The tag name of the Docker image tag to be deployed
  # -- e.g. v2.0.506
  version: "v2.1.1739"
  # -- The timezone which will be used in the application
  timezone: Europe/Zurich
  # -- The schedule for the cron job
  # -- Refer to https://en.wikipedia.org/wiki/Cron for valid values.
  schedule: 0 0 * * *

configuration:
  # -- The default workgroup name to assign the borehole to if there is no matching workgroup in the target database
  targetDefaultWorkgroupName: Sync
  # -- The default user subject/identifier to assign the synced boreholes to.
  targetDefaultUserSub: sub_admin

# Database configuration (source and target)
# Each connection string is stored as a secret and read directly by the sync job
# (CONNECTIONSTRINGS__SourceBdmsContext / CONNECTIONSTRINGS__TargetBdmsContext).
db:
  source:
    # -- The full connection string of the source database (stored as secret)
    # -- e.g. Host=db;Port=5432;Database=bdms;Username=user;Password=pass
    connectionString:
  target:
    # -- The full connection string of the target database (stored as secret)
    # -- e.g. Host=db;Port=5432;Database=bdms;Username=user;Password=pass
    connectionString:
