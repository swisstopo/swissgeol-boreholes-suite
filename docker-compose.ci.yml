services:
  api:
    build:
      target: deploy
    # Development env keeps the in-app database seeding that integration tests rely on,
    # while the deploy image skips the cold dotnet watch compile on startup.
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    # Drop the host-source bind-mount and the anonymous bin/obj volumes used by dev hot-reload.
    volumes: !reset null
    healthcheck:
      interval: 2s
      start_period: 10s

  oidc-server:
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost/.well-known/openid-configuration || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 5s