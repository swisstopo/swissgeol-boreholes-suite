name: Deploy Dev

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
    secrets:
      AWS_ROLE_DEV:
        required: true
      AWS_REGION:
        required: true
  workflow_dispatch:
    inputs:
      version:
        description: "Version to deploy (e.g. 1.2.3)"
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to dev cluster
    environment: dev

    env:
      KUBECONFIG: ${{ github.workspace }}/.kube/config

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_DEV }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: aws eks update-kubeconfig --name dev --region "$AWS_REGION"

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Deploy to dev
        env:
          VERSION: ${{ inputs.version }}
        run: |
          helm upgrade swissgeol-boreholes ./charts/swissgeol-boreholes \
            -f environments/dev/boreholes.values.yaml \
            --set app.version="$VERSION" \
            -n swissgeol-boreholes \
            --kubeconfig "$KUBECONFIG" \
            --install --wait --timeout 5m
