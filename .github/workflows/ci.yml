name: CI

on:
  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  client:
    runs-on: ubuntu-latest
    name: Build and check client
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: src/client/package-lock.json

      - working-directory: ./src/client
        run: npm ci

      - name: Verify generated types are up to date
        working-directory: ./src/client
        run: |
          npm run openapi:gen
          git diff --exit-code src/api/generated \
            || (echo "Generated types are out of date. Run 'npm run openapi:gen' and commit the result." && exit 1)

      - working-directory: ./src/client
        run: npm run lint

      - working-directory: ./src/client
        run: npm run knip

      - name: Run vitest unit tests
        working-directory: ./src/client
        run: npm run test:unit

      - working-directory: ./src/client
        run: npm run build
        env:
          VITE_APP_VERSION: 0.0.99+dev

      - name: Upload client dist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: client-dist
          path: src/client/dist
          retention-days: 1

  build-api-images:
    runs-on: ubuntu-latest
    name: Build api images
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build api image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./src
          file: ./src/api/Dockerfile
          target: deploy
          # VERSION matches the 0.0.99 dev placeholder used by every other build arg in the repo.
          # REVISION is a fixed string so the publish layer stays cache-stable across commits;
          # swap to ${{ github.sha }} if accurate SourceRevisionId in binaries matters more than cache hits.
          build-args: |
            VERSION=0.0.99
            REVISION=ci
          load: true
          tags: bdms-api
          cache-from: type=gha,scope=bdms-api
          cache-to: type=gha,scope=bdms-api,mode=max

      - name: Save images
        run: docker save bdms-api | gzip > /tmp/bdms-images.tar.gz

      - name: Upload images
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bdms-images
          path: /tmp/bdms-images.tar.gz
          retention-days: 1
          compression-level: 0

  api:
    runs-on: ubuntu-latest
    name: Build and run tests
    needs: build-api-images
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Build solution
        run: dotnet build BDMS.sln -c Release /warnaserror

      - name: Prepare backend
        uses: ./.github/actions/prepare-backend
        with:
          services: minio db api dataextraction

      - name: Verify swagger.json is up to date
        run: |
          curl -fsSL http://localhost:5000/swagger/v2/swagger.json -o /tmp/swagger-fresh.json
          diff src/client/openapi/swagger.json /tmp/swagger-fresh.json \
            || (echo "swagger.json is out of date. Run 'npm run openapi:fetch && npm run openapi:gen' and commit the result." && exit 1)

      - name: Run dotnet tests
        run: dotnet test BDMS.sln -c Release --no-build --verbosity normal --filter TestCategory!=LongRunning --logger trx

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: dotnet-test-results
          path: ${{ github.workspace }}/**/TestResults/**/*

  cypress-tests:
    runs-on: ubuntu-latest
    name: Run cypress tests
    needs: [build-api-images, client]
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        index: [ 1, 2, 3, 4, 5 ]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Prepare backend
        uses: ./.github/actions/prepare-backend
        with:
          services: minio db api oidc-server dataextraction ocr

      - name: Setup Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: src/client/package-lock.json

      - working-directory: ./src/client
        run: npm ci

      - name: Download client dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: client-dist
          path: src/client/dist

      - name: Cypress run
        uses: cypress-io/github-action@948d67d3074f1bbb6379c8bdbb04e95d2f8e593f # v7.4.0
        with:
          command: npx cypress run --record --key ${{ secrets.CYPRESS_RECORD_KEY }} --ci-build-id ${{ github.repository }}-${{ github.run_id }}-${{ github.run_attempt }} --group shard-${{ matrix.index }}
          start: npm run preview
          wait-on: "http://localhost:3000"
          wait-on-timeout: 120
          working-directory: ./src/client
        env:
          VITE_APP_VERSION: 0.0.99+dev
          TZ: Europe/Zurich
          SPLIT: ${{ strategy.job-total }}
          # strategy.job-index is 0-based (what cypress-split expects); matrix.index stays
          # 1-based for the --group shard label and the branch-protection check names.
          SPLIT_INDEX: ${{ strategy.job-index }}
    env:
      # Pass the GitHub token lets this action correctly
      # determine the unique run id necessary to re-run the checks
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  view-sync:
    runs-on: ubuntu-latest
    name: Run view-sync

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup environment
        working-directory: src/view-sync
        run: docker compose -f docker-compose.services.yml up --build --wait

      - name: Run view-sync
        working-directory: src/view-sync
        run: docker compose -f docker-compose.yml up --build --exit-code-from view-sync

  extern-sync:
    runs-on: ubuntu-latest
    name: Run extern-sync

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup environment
        working-directory: src/extern-sync
        run: docker compose -f docker-compose.services.yml up --build --wait

      - name: Run extern-sync
        working-directory: src/extern-sync
        run: docker compose -f docker-compose.yml up extern-sync --build --exit-code-from extern-sync
