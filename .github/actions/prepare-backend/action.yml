name: Prepare backend
description: Load prebuilt api images from the build-images job artifact and start compose services.

inputs:
  pulled-services:
    description: Space-separated list of compose services whose images are pulled from a registry.
    required: true
  up-services:
    description: Space-separated list of compose services to start (pulled + loaded).
    required: true

runs:
  using: composite
  steps:
    - name: Log in to GHCR
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        GH_ACTOR: ${{ github.actor }}
      run: echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin

    - name: Download api images
      uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
      with:
        name: bdms-images
        path: /tmp

    - name: Load api images
      shell: bash
      run: docker load -i /tmp/bdms-images.tar.gz

    - name: Pull compose images
      shell: bash
      env:
        PULLED_SERVICES: ${{ inputs.pulled-services }}
      run: docker compose pull $PULLED_SERVICES

    - name: Start services
      shell: bash
      env:
        UP_SERVICES: ${{ inputs.up-services }}
        # Align compose's default image tags (<project>-<service>) with the bdms-api / bdms-api-legacy tags loaded above.
        COMPOSE_PROJECT_NAME: bdms
      run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up --wait --no-build $UP_SERVICES